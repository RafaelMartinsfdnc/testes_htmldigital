	<script>

    function adjustMathElements() {
        const mathElements = document.querySelectorAll('math');

        mathElements.forEach(math => {
            const targetElement = math.firstElementChild?.tagName === 'mrow' ?
                math.firstElementChild :
                math;

            const width = targetElement.getBoundingClientRect().width;

            const section = document.querySelector('main > section')
            const sectionWidth = section.getBoundingClientRect().width;

            const ratio = width + 50 / sectionWidth;

            if (width > sectionWidth - 24) {
                const ratio = (sectionWidth - 24) / (width + 50);
                const fontSize = Math.max(0.8, ratio * 1.9);
                targetElement.style.fontSize = `${fontSize}dvh `;

                const newWidth = targetElement.getBoundingClientRect().width;
                if (newWidth > sectionWidth - 24) {
                    const additionalRatio = (sectionWidth - 24) / newWidth;
                    targetElement.style.fontSize =`${fontSize * additionalRatio}dvh`;
                }
            }

        })
    }
    document.addEventListener('DOMContentLoaded', adjustMathElements)

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {

            console.log('Resize ended!');
            adjustMathElements()
        }, 500);
    });
</script>
